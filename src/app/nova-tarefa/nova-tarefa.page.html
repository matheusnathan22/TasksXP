
<div class="ion-page" id="main-content">
  <ion-header>
    <ion-toolbar>
      <ion-title>Nova tarefa</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content>
    <div>
      <ion-list>
        <ion-item>
          <ion-input label="Título:"></ion-input>
        </ion-item>
        <ion-item>
          <ion-textarea label="Descrição:"></ion-textarea>
        </ion-item>
      </ion-list>
    </div>
    
    <div class="data">
      <style>
        .data{text-align: center;}
      </style>
      <br>
      <ion-label>Data:</ion-label>
      <ion-datetime-button datetime="datetime"></ion-datetime-button>
      <ion-modal [keepContentsMounted]="true">
        <ng-template>
          <ion-datetime id="datetime"></ion-datetime>
        </ng-template>
      </ion-modal>
    </div>

    <div class="dificuldade">
      <style>
        .dificuldade{text-align: center;}
      </style>
      <br>
      <ion-label>Dificuldade:</ion-label>
      <ion-segment value="default">
        <ion-segment-button value="Fácil">
          <ion-label>Fácil</ion-label>
        </ion-segment-button>
        <ion-segment-button value="Médio">
          <ion-label>Médio</ion-label>
        </ion-segment-button>
        <ion-segment-button value="Difícil">
          <ion-label>Difícil</ion-label>
        </ion-segment-button>
      </ion-segment>
    </div>
  </ion-content>
  
  <ion-footer class="salvarCancelar">
    <style>
      .salvarCancelar{text-align: center;}
    </style>
    <ion-toolbar>
      <ion-button>Salvar</ion-button> <ion-button routerLink="/tarefas" >Cancelar</ion-button>
    </ion-toolbar>
  </ion-footer>
</div>
